<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - BSnap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: #111111;
            --border-color: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #CCCCCC;
            --text-muted: #888888;
            --accent: #8B5CF6;
            --max-width: 720px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        .site-header {
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .header-inner {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 8px;
            font-weight: 400;
        }

        .content-area {
            padding: 48px 0 80px;
        }

        .content-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 32px;
            text-align: center;
        }

        .prose h2 {
            font-size: 20px;
            color: var(--text-primary);
            margin: 32px 0 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .prose p {
            margin-bottom: 16px;
        }

        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            border-color: #2A2A2A;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .info-row i {
            font-size: 24px;
            color: var(--accent);
        }

        .site-footer {
            padding: 24px 0;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="container header-inner">
                <a href="../index.html" class="logo-text">kawabaron<span class="logo-sub">Apps</span></a>
            </div>
        </header>
        <main class="content-area">
            <div class="container prose">
                <h1 class="content-title">お問い合わせ</h1>
                <p>BSnapに関するご意見、ご要望、不具合の報告などは、以下のメールアドレスまでお問い合わせください。</p>

                <div class="info-card">
                    <div class="info-row">
                        <i class="ti ti-mail"></i>
                        <div>
                            <div style="font-size: 14px; color: var(--text-muted);">メールでのお問い合わせ</div>
                            <p style="margin: 0; font-size: 16px;">
                                <a href="mailto:info@example.com">kawabarondev@gmail.com</a>
                            </p>
                        </div>
                    </div>
                </div>

                <p style="font-size: 13px; color: var(--text-muted); margin-top: 32px;">
                    ※ お問い合わせの際は、なるべくご利用の端末機種（例：iPhone 15）やOSのバージョンをご記載いただくと、スムーズな対応が可能です。<br>
                    ※ 返信までに数日程度お時間をいただく場合がございます。あらかじめご了承ください。
                </p>
            </div>
        </main>
        <footer class="site-footer">
            <div class="container">
                <p>&copy; 2026 川端孝明. All rights reserved.</p>
            </div>
        </footer>
    </div>
</body>

</html>
